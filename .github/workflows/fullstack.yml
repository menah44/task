name: Form Fullstack Kubernetes CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:

  quality-gates:
    name: Quality & Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

   
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

   
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: taskio-backend/Dockerfile

      - name: Run Hadolint Frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: taskio-fronr/Dockerfile

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./helm
          framework: helm
          soft_fail: false
          skip_check: CKV_K8S_21,CKV_K8S_14,CKV_K8S_43,CKV_K8S_35

   
      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint ./helm

      - name: Helm Template Validation
        run: |
          helm template taskio ./helm \
            -f helm/values-prod.yaml > /dev/null

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build (${{ matrix.app }})
    needs: quality-gates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: backend
            context: ./taskio-backend
            image: taskio-backend

          - app: frontend
            context: ./taskio-fronr
            image: taskio-frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build ${{ matrix.app }} image
        run: |
          if [ "${{ matrix.app }}" = "frontend" ]; then
            docker build --pull \
            --build-arg NEXT_PUBLIC_API_URL=http://${{ secrets.LOAD_BALANCER_IP }}/api/v1 \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }} \
            ${{ matrix.context }}
          else
            docker build --pull \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }} \
            ${{ matrix.context }}
          fi
      - name: Scan ${{ matrix.app }} image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL
          scanners: vuln

      - name: Generate Trivy SARIF Report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
          exit-code: '0'
          scanners: vuln

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.app }}-report
          path: trivy-${{ matrix.app }}.sarif
   
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          format: spdx-json
          output: sbom-${{ matrix.app }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.app }}
          path: sbom-${{ matrix.app }}.spdx.json

      - name: Push ${{ matrix.app }} image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }}

  deploy:  
    needs: build
    runs-on: ubuntu-latest
    steps: 

      - name: Deploy with helm
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |

            cd ~/task
            git pull origin main
            cd helm

            echo "Deploying application..."

            helm upgrade --install taskio . \
              -f values-prod.yaml \
              -n form-app \
              --create-namespace \
              --set backend.image.tag=${{ github.sha }} \
              --set frontend.image.tag=${{ github.sha }} \
              --set secret.jwtSecret="${{ secrets.JWT_SECRET }}" \
              --wait \
              --timeout 5m \
              --atomic

            echo "Running Smoke Test..."

            curl -f http://${{ secrets.LOAD_BALANCER_IP }}/api/v1

            echo "Smoke Test Passed"

            echo "Running Kubescape..."

            kubescape scan framework nsa \
              --format json \
              --output kubescape-report.json || true

            echo "Kubescape Scan Finished"
