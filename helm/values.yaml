backend:
  replicaCount: 2

  image:
    repository: emanabosamra/taskio-backend
    tag: ""
    pullPolicy: Always

  containerPort: 5000
  service:
    port: 5000
    type: ClusterIP

  startupProbe:
    path: /health
    failureThreshold: 30
    periodSeconds: 10

  livenessProbe:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10

  readinessProbe:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5
  
  persistence:
    enabled: true
    storageClass: longhorn
    accessMode: ReadWriteMany
    size: 10Gi
 
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
frontend:
  replicaCount: 2

  image:
    repository: emanabosamra/taskio-frontend
    tag: ""

  service:
    port: 3000
    type: ClusterIP

  containerPort: 3000

  startupProbe:
    path: /
    failureThreshold: 30
    periodSeconds: 10

  livenessProbe:
    path: /
    initialDelaySeconds: 30
    periodSeconds: 10

  readinessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 5

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

config:
  dbHost: postgres-ha-rw
  dbPort: "5432"
  dbUsername: taskio_user
  dbName: taskio
  port: "5000"
  nextPublicApiUrl: ""
  gatewayPort: "4000"
  backendUrl: "http://backend:5000"
ingress:
  className: nginx

postgres:
  instances: 3

  storage:
    size: 5Gi
    class: longhorn

  database: taskio
  owner: taskio_user

secret:
  jwtSecret: ""
  superAdmin:
    name: ""
    email: ""
    password: ""

gateway:
  replicaCount: 2

  image:
    repository: emanabosamra/taskio-gateway
    tag: ""
    pullPolicy: Always

  containerPort: 4000

  service:
    port: 4000
    type: ClusterIP

  startupProbe:
    path: /health
    failureThreshold: 30
    periodSeconds: 10

  livenessProbe:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10

  readinessProbe:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
