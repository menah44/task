name: Form Fullstack Kubernetes CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
  
      - name: Install backend dependencies
        working-directory: taskio-backend
        run: npm ci

      - name: Run backend tests
        working-directory: taskio-backend
        run: npm test -- --runInBand 

      - name: Install frontend dependencies
        working-directory: taskio-fronr
        run: npm ci

      - name: Run frontend lint
        working-directory: taskio-fronr
        run: npm run lint

  sonarqube:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
    
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
           SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
           SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
   
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
           SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build (${{ matrix.app }})
    needs: sonarqube
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: backend
            context: ./taskio-backend
            image: taskio-backend

          - app: frontend
            context: ./taskio-fronr
            image: taskio-frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build ${{ matrix.app }} image
        run: |
          if [ "${{ matrix.app }}" = "frontend" ]; then
            docker build --pull \
            --build-arg NEXT_PUBLIC_API_URL=http://${{ secrets.LOAD_BALANCER_IP }}/api/v1 \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }} \
            ${{ matrix.context }}
          else
            docker build --pull \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }} \
            ${{ matrix.context }}
          fi
      - name: Scan ${{ matrix.app }} image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL
          scanners: vuln

      - name: Generate Trivy SARIF Report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
          exit-code: '0'
          scanners: vuln

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.app }}-report
          path: trivy-${{ matrix.app }}.sarif

      - name: Push ${{ matrix.app }} image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }}

  deploy:   
    needs: build
    runs-on: ubuntu-latest
    steps: 

      - name: Deploy to Kubernetes
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |

            cd ~/task/k8s


            echo "Updating backend image..."

            kubectl set image deployment/backend \
            backend=${{ secrets.DOCKER_USERNAME }}/taskio-backend:${{ github.sha }} \
            -n form-app



            echo "Updating frontend image..."

            kubectl set image deployment/frontend \
            frontend=${{ secrets.DOCKER_USERNAME }}/taskio-frontend:${{ github.sha }} \
            -n form-app



            echo "Waiting for backend rollout..."

            if ! kubectl rollout status deployment/backend \
            -n form-app \
            --timeout=300s
            then

              echo "Backend deployment failed!"

              echo "========== Pods =========="
              kubectl get pods -n form-app -o wide

              echo "========== ReplicaSets =========="
              kubectl get rs -n form-app

              echo "========== Deployment =========="
              kubectl describe deployment backend -n form-app

              echo "========== Events =========="
              kubectl get events -n form-app --sort-by=.lastTimestamp

              echo "========== Backend Pods =========="
              kubectl get pods -n form-app -l app=backend

              for pod in $(kubectl get pods -n form-app -l app=backend -o jsonpath='{.items[*].metadata.name}')
              do
                  echo "========== Logs for $pod =========="
                  kubectl logs $pod -n form-app --tail=100 || true
                  kubectl logs $pod -n form-app --previous --tail=100 || true
              done

              echo "Rolling back backend..."
              kubectl rollout undo deployment/backend -n form-app

              exit 1

            fi



            echo "Waiting for frontend rollout..."

            if ! kubectl rollout status deployment/frontend \
            -n form-app \
            --timeout=300s
            then

              echo "Frontend deployment failed!"
              echo "========== Frontend Pods =========="
              kubectl get pods -n form-app -l app=frontend -o wide

              echo "========== Frontend Deployment =========="
              kubectl describe deployment frontend -n form-app

              echo "========== Events =========="
              kubectl get events -n form-app --sort-by=.lastTimestamp

              echo "========== Frontend Pods =========="
              kubectl get pods -n form-app -l app=frontend

              for pod in $(kubectl get pods -n form-app -l app=frontend -o jsonpath='{.items[*].metadata.name}')
              do
                  echo "========== Logs for $pod =========="
                  kubectl logs $pod -n form-app --tail=100 || true
                  kubectl logs $pod -n form-app --previous --tail=100 || true
              done
              echo "Rolling back frontend..."

              kubectl rollout undo deployment/frontend \
              -n form-app

              exit 1

            fi



            echo "Deployment successful"



            echo "Backend rollout history:"
            kubectl rollout history deployment/backend \
            -n form-app


            echo "Frontend rollout history:"
            kubectl rollout history deployment/frontend \
            -n form-app



            echo "Current pods status:"
            kubectl get pods -n form-app
