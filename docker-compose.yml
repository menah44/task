services:
  postgres:
    image: postgres:16
    container_name: taskio-postgres
    restart: always
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - taskio-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 5

  backend:
    image: emanabosamra/taskio-backend:${IMAGE_TAG}
    container_name: taskio-backend
    restart: always
    env_file:
      - .env.production
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - postgres
    networks:
      - taskio-net

  frontend:
    image: emanabosamra/taskio-frontend:${IMAGE_TAG}
    container_name: taskio-frontend
    restart: always
    env_file:
      - .env.production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - backend
    networks:
      - taskio-net
  nginx:
    image: nginx:latest
    container_name: taskio-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - taskio-net
volumes:
  postgres_data:

networks:
  taskio-net:
    driver: bridge
