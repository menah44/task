apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: form-ingress
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: {{ .Values.frontend.service.port }}

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: {{ .Values.gateway.service.port }}
