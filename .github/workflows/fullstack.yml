name: Form Fullstack Production CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taskio-backend:latest ./taskio-backend

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/taskio-backend:latest

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taskio-frontend:latest ./taskio-fronr

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/taskio-frontend:latest

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/task
            docker-compose pull
            docker-compose up -d
